        meta_path: ${oc.env:commonspace}/processed_datasets/DIODE/val.txt
        frames: [0, -1, 1]
        dataset_name: 'diode_indoor'
        transforms: *crop_resize_transforms
      - _target_: training.dataset.depth_estimation.synth4k.Dataset
        data_root: ${oc.env:commonspace}/datasets/game4k/cyberpunk
        split: 'val'
        meta_path: ${oc.env:commonspace}/processed_datasets/cyberpunk/val_new.txt
        frames: [0, -1, 1]
